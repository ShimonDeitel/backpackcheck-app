name: BackpackChecklist
options:
  bundleIdPrefix: com.shimondeitel.backpackcheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BackpackChecklist:
    type: application
    platform: iOS
    sources:
      - path: BackpackChecklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.backpackcheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BackpackChecklist/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BackpackChecklistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BackpackChecklistTests
      - path: BackpackChecklist.storekit
    dependencies:
      - target: BackpackChecklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.backpackcheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BackpackChecklistUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BackpackChecklistUITests
    dependencies:
      - target: BackpackChecklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.backpackcheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BackpackChecklist:
    build:
      targets:
        BackpackChecklist: all
        BackpackChecklistTests: [test]
        BackpackChecklistUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BackpackChecklist.storekit
    test:
      config: Debug
      storeKitConfiguration: BackpackChecklist.storekit
      targets:
        - BackpackChecklistTests
        - BackpackChecklistUITests
    archive:
      config: Release
